; Orange — Godot 4.x export presets
; P29: Web Export Validation
;
; To export from the command line:
;   godot --headless --export-release "Web" builds/web/index.html
;
; To serve the build locally:
;   cd builds/web && python3 -m http.server 8060
;   Then open: http://localhost:8060
;
; The builds/ folder is git-ignored.  This config file is committed because it
; contains no sensitive data (no platform signing keys, no credentials).
;
; Audio note for future implementors:
;   Godot 4 web builds block AudioServer until the first user gesture.
;   Any audio playback added later MUST be triggered from an input callback,
;   not from _ready() or a timer.  Autostart audio will silently fail on web.

[preset.0]

name="Web"
platform="Web"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="builds/web/index.html"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false

[preset.0.options]

custom_template/debug=""
custom_template/release=""
variant/extensions_support=false
vram_texture_compression/for_desktop=false
vram_texture_compression/for_mobile=false
html/export_icon=true
html/custom_html_shell=""
html/head_include=""
html/canvas_resize_policy=2
html/focus_canvas_on_start=true
html/experimental_virtual_keyboard=false
progressive_web_app/enabled=false
progressive_web_app/offline_page=""
progressive_web_app/display=1
progressive_web_app/orientation=0
progressive_web_app/icon_144x144=""
progressive_web_app/icon_180x180=""
progressive_web_app/icon_512x512=""
progressive_web_app/background_color=Color(0, 0, 0, 1)
